{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-cog me-2"></i>Admin Settings</h2>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Store Information</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Store Name</label>
                            <input type="text" class="form-control" value="Frozen Kadai">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Contact Email</label>
                            <input type="email" class="form-control" value="admin@frozenkadai.com">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Contact Phone</label>
                            <input type="text" class="form-control" value="+91 98765 43210">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" rows="2">123 Meat Street, Palani, Tamil Nadu 624601</textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Update Information</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Delivery Settings</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Free Delivery Threshold (₹)</label>
                            <input type="number" class="form-control" value="0">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Delivery Charge (₹)</label>
                            <input type="number" class="form-control" value="0">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Estimated Delivery Time</label>
                            <input type="text" class="form-control" value="24-48 hours">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Update Settings</button>
                    </form>
                </div>
            </div>
            
            <div class="card shadow">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Admin Users</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        Only users with username 'admin' have admin access.
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Current Admin</label>
                        <input type="text" class="form-control" value="admin" readonly>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
